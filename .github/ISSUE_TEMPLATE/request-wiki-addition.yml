name: Request Wiki Addition
description: Request to have your wiki added to the IRWA website. 
title: "[New Wiki] <Replace with your wiki name> "
assignees: ["whostacking", "enews"]
labels: ["wiki addition request"]
body:
  - type: markdown
    attributes:
      value: |
        Welcome! Please only request wikis to be added that are part of the Independent Roblox Wiki Alliance (IRWA). To join the alliance, please see [this page](https://indierobloxwikis.org/joining/) for more information.
        Note that a bureaucrat on the wiki must either submit this request or confirm it for it to be handled. You should only continue with this form if you have applied and have been accepted via our Discord Server.

        Here is a preview of how a listing looks like: <img width="800" alt="Image" src="https://indierobloxwikis.org/assets/promofiles/wiki-listing.png" />

  - type: input
    id: wiki-name
    attributes:
      label: Wiki Name
      description: Chosen display name for the wiki.
      placeholder: My Awesome Wiki
    validations:
      required: true

  - type: input
    id: wiki-url
    attributes:
      label: Wiki URL
      description: URL to the wiki.
      placeholder: https://awesome.wiki
    validations:
      required: true

  - type: textarea
    id: wiki-logo
    attributes:
      label: Wiki Logo
      description: |
        Please attach your wiki logo image here. The image will be displayed as **400x400px**. 
        You can drag and drop the file into this text box, or click the attachment icon to upload it.

        Should your wiki logo be monochrome, please insert the **white version**. Should your wiki logo be basic and does not have multiple colours, .svg is recommended.
        **Do not insert any other text; only insert an image**.
      placeholder: Drag and drop your chosen logo image here...
    validations:
      required: true

  - type: checkboxes
    id: social-links
    attributes:
      label: Social Links
      description: Wiki listings typically include some social links. Please select what you would like to add. 
      options:
        - label: Wiki Discord
        - label: Twitter / X
        - label: Ko-fi
        - label: Patreon

  - type: textarea
    id: social-links-urls
    attributes:
      label: Social Link URLs
      description: |
        Provide the URLs for each social link you selected above. One per line.
        Along with social links, you must link to the Roblox game you are documenting. Should you be documenting multiple games on your wiki, you don't have to link the games at all.
      placeholder: |
        Roblox Game: https://roblox.com/games/1818/
        Wiki Discord: https://discord.gg/hmqCYg4P23 
        Twitter: https://twitter.com/roblox
        Ko-fi: https://ko-fi.com/Dovedale

  - type: textarea
    id: wiki-staff
    attributes:
      label: Wiki Staff
      description: Let us know the names of your staff team. Please ensure that it stays comma-seperated.
      placeholder: Shedletsky, Telamon, Brighteyes, MrDoomBringer

  - type: textarea
    id: wiki-description
    attributes:
      label: Wiki Description
      description: Please give a short and succinct description of your wiki for others. We may edit this for clarity or to fix grammar. 
      placeholder: The official and independent community focused wiki site for Dovedale Railway that works with developers to provide the best in class information for the game.

  - type: checkboxes
    id: captchas
    attributes:
      label: Before you submit...
      description: Please complete the following declaration
      options:
        - label: I confirm my wiki that I am submitting is already an existing approved IRWA member, and all the information I am submitting is true and accurate. 
      validations:
        required: true
