name: Compile LESS to CSS

on:
  push:
    paths:
      - '**/*.less'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install LESS compiler
        run: npm install -g less@4.6.4

      - name: Compile all LESS to CSS
        run: |
          # Find all .less files, excluding those starting with _ (common for partials)
          find . -name "*.less" ! -name "_*" | while read -r file; do
            css_file="${file%.less}.css"
            echo "Compiling $file to $css_file"
            lessc --math=strict "$file" "$css_file"
          done

      - name: Commit and Push CSS
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Check if there are changes to commit to avoid workflow errors
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "style: compile LESS to CSS [skip ci]"
            git push
          fi