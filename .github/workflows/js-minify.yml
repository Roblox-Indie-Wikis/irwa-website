name: Minify JS
on:
  push:
    paths:
      - 'assets/js/scripts.js' # Only trigger when source JS changes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minify-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Minifier
        run: npm install -g terser

      - name: Minify JavaScript
        run: |
          # Minify the JS asset used by the site
          terser assets/js/scripts.js -o assets/js/scripts.min.js

      - name: Commit and Push Minified JS
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Check if there are changes to commit to avoid workflow errors
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: minify scripts.js [skip ci]"
            git push
          fi