name: Minify JS and CSS
on:
  push:
    paths:
      - '**.js'
      - '**.css'
      - '!**.min.js'
      - '!**.min.css'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  minify-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Minifiers
        run: npm install -g terser clean-css-cli

      - name: Minify JavaScript
        run: |
          find . -name "*.js" ! -name "*.min.js" -type f -exec sh -c 'terser "$1" -o "${1%.js}.min.js"' _ {} \;

      - name: Minify CSS
        run: |
          find . -name "*.css" ! -name "*.min.css" -type f -exec sh -c 'cleancss -o "${1%.css}.min.css" "$1"' _ {} \;

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: sync external robloxapi docs and minify"
          committer: GitHub <noreply@github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          branch: patch/sync-assets
          title: "Update Roblox API Documentation & Minified Assets"
          body: "This is an automated PR to sync documentation and minify JS/CSS files."
          delete-branch: true

      - name: Auto-merge PR
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}