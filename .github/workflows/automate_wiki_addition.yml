name: Add Wiki to IRWA Directory
on:
  issues:
    types: [labeled]

jobs:
  update-directory:
    if: github.event.label.name == 'wiki addition request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse Issue Form
        uses: stefanbuck/github-issue-parser@v3
        id: issue-parser
        with:
          template-path: .github/ISSUE_TEMPLATE/request-wiki-addition.yml

      - name: Process Data and Update YAML
        shell: python
        env:
          WIKI_NAME: ${{ steps.issue-parser.outputs.wiki-name }}
          WIKI_URL: ${{ steps.issue-parser.outputs.wiki-url }}
          WIKI_DESC: ${{ steps.issue-parser.outputs.wiki-description }}
          WIKI_LOGO: ${{ steps.issue-parser.outputs.wiki-logo }}
          WIKI_SOCIALS: ${{ steps.issue-parser.outputs.social-links-urls }}
          WIKI_STAFF: ${{ steps.issue-parser.outputs.wiki-staff }}
        run: |
          import yaml
          import re
          import os
          from datetime import datetime

          # Custom Dumper to quote ONLY values, not keys
          class ValueQuoter(yaml.SafeDumper):
              def represent_data(self, data):
                  # This forces strings to use double quotes
                  if isinstance(data, str):
                      return self.represent_scalar('tag:yaml.org,2002:str', data, style='"')
                  return super().represent_data(data)

          # Prevent quoting of dictionary keys
          ValueQuoter.add_representer(dict, lambda dumper, data: 
              dumper.represent_mapping('tag:yaml.org,2002:map', data, flow_style=False))

          # 1. Collect Data
          name = os.getenv("WIKI_NAME", "").strip()
          url = os.getenv("WIKI_URL", "").strip()
          desc = os.getenv("WIKI_DESC", "").strip()
          logo_raw = os.getenv("WIKI_LOGO", "").strip()
          socials_raw = os.getenv("WIKI_SOCIALS", "").strip()
          staff_raw = os.getenv("WIKI_STAFF", "").strip()

          # 2. Date and Logo Cleanup
          current_date = datetime.now().strftime("%B %Y")
          logo_url = re.findall(r'\((http[s]?://.*?)\)', logo_raw)
          logo = logo_url[0] if logo_url else logo_raw

          # 3. Build the Entry
          new_entry = {
              "name": name,
              "link": url,
              "logo": logo,
              "description": desc,
              "joined": current_date,
              "team": [{"name": s.strip()} for s in staff_raw.split(',') if s.strip()]
          }

          # 4. Map Socials
          for line in socials_raw.split('\n'):
              line_l = line.lower()
              u = re.search(r'http[s]?://\S+', line)
              if not u: continue
              link = u.group()
              if "discord" in line_l: new_entry["discord"] = link
              elif "twitter" in line_l or "x.com" in line_l: new_entry["twitter"] = link
              elif "ko-fi" in line_l or "patreon" in line_l: new_entry["kofi"] = link

          # 5. Load and Append
          file_path = '_data/members.yml'
          if os.path.exists(file_path):
              with open(file_path, 'r', encoding='utf-8') as f:
                  data = yaml.safe_load(f) or []
          else:
              data = []

          data.append(new_entry)

          # 6. Write back
          with open(file_path, 'w', encoding='utf-8') as f:
              yaml.dump(
                  data, 
                  f, 
                  Dumper=ValueQuoter, 
                  sort_keys=False, 
                  allow_unicode=True, 
                  default_flow_style=False,
                  width=1000  # Prevents the backslash line-wrapping
              )

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add ${{ steps.issue-parser.outputs.wiki-name }} to directory"
          title: "[Wiki Addition] ${{ steps.issue-parser.outputs.wiki-name }}"
          branch: "wiki-addition-${{ github.event.issue.number }}"
          body: "Closes #${{ github.event.issue.number }}"
