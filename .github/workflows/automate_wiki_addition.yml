name: Add Wiki to IRWA Directory
on:
  issues:
    types: [labeled]

jobs:
  update-directory:
    if: github.event.label.name == 'wiki addition request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process Issue Data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: python
        run: |
          import json
          import re
          import os
          import subprocess
          from datetime import datetime

          # 1. Use GitHub CLI to get issue data in JSON format
          # This is the most robust way to parse Issue Forms
          result = subprocess.run(
              ['gh', 'issue', 'view', os.environ['ISSUE_NUMBER'], '--json', 'body'],
              capture_output=True, text=True
          )
          issue_body = json.loads(result.stdout)['body']

          # 2. Extract data using headers (###)
          # This helper finds the text between a specific header and the next one
          def get_section(header, body):
              pattern = f"### {header}\\s+(.*?)(?=\\n###|$)"
              match = re.search(pattern, body, re.DOTALL)
              return match.group(1).strip() if match else ""

          # Mapping your specific form Labels to variables
          # Note: Use the 'label' text from your YAML template here
          name = get_section("Wiki Name", issue_body)
          url = get_section("Wiki URL", issue_body)
          desc = get_section("Wiki Description", issue_body)
          logo_raw = get_section("Wiki Logo", issue_body)
          socials_raw = get_section("Social Link URLs", issue_body)
          staff_raw = get_section("Wiki Staff", issue_body)

          # 3. Validation
          if not name or name == "_No response_":
              print(f"Error: Found name '{name}'. Check if 'Wiki Name' matches the template label.")
              exit(1)

          # 4. Clean up Date and Logo
          current_date = datetime.now().strftime("%B %Y")
          logo_url = re.findall(r'\((http[s]?://.*?)\)', logo_raw)
          logo = logo_url[0] if logo_url else logo_raw

          # 5. Build the YAML string
          new_entry = f'\n- name: "{name}"\n'
          new_entry += f'  link: "{url}"\n'
          new_entry += f'  logo: "{logo}"\n'
          new_entry += f'  description: "{desc}"\n'
          new_entry += f'  joined: "{current_date}"\n'

          # 6. Map Socials
          for line in socials_raw.split('\n'):
              line_l = line.lower()
              u = re.search(r'http[s]?://\S+', line)
              if not u: continue
              link = u.group()
              if "discord" in line_l: new_entry += f'  discord: "{link}"\n'
              elif "twitter" in line_l or "x.com" in line_l: new_entry += f'  twitter: "{link}"\n'
              elif "ko-fi" in line_l or "patreon" in line_l: new_entry += f'  kofi: "{link}"\n'

          # 7. Handle Staff
          if staff_raw and staff_raw != "_No response_":
              new_entry += '  team:\n'
              for staff in staff_raw.split(','):
                  s_name = staff.strip()
                  if s_name:
                      new_entry += f'    - name: "{s_name}"\n'

          # 8. Append to file
          with open('_data/members.yml', 'a', encoding='utf-8') as f:
              f.write(new_entry)
          
          # Pass data to GitHub Env for the next step
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"WIKI_NAME={name}\n")

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add ${{ env.WIKI_NAME }} to directory"
          title: "[Wiki Addition] ${{ env.WIKI_NAME }}"
          branch: "wiki-addition-${{ github.event.issue.number }}"
          body: "Automated wiki addition for **${{ env.WIKI_NAME }}**. Closes #${{ github.event.issue.number }}"
