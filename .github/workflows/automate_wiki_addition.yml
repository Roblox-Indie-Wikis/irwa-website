name: Add Wiki to IRWA Directory
on:
  issues:
    types: [labeled]

jobs:
  update-directory:
    if: github.event.label.name == 'wiki addition request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse Issue Body
        uses: eddiehubcommunity/issue-forms-body-parser@v2.2.0
        id: issue-parser
        with:
          issue_id: ${{ github.event.issue.number }}
          separator: '###' # This is the standard separator for GitHub Issue Forms

      - name: Process Data and Update YAML
        shell: python
        env:
          # The parser above outputs JSON. We grab the specific IDs from your form.
          # Note: IDs must match your .yml form exactly.
          WIKI_DATA: ${{ steps.issue-parser.outputs.payload }}
        run: |
          import json
          import re
          import os
          from datetime import datetime

          # 1. Load the JSON payload from the parser
          data = json.loads(os.getenv("WIKI_DATA", "{}"))
          
          # Map form IDs to variables (Verify these IDs match your issue template!)
          name = data.get("wiki-name", "").strip()
          url = data.get("wiki-url", "").strip()
          desc = data.get("wiki-description", "").strip()
          logo_raw = data.get("wiki-logo", "").strip()
          socials_raw = data.get("social-links-urls", "").strip()
          staff_raw = data.get("wiki-staff", "").strip()

          # 2. Critical Check: If Name is blank, the parser failed or form is empty
          if not name or name == "_No response_":
              print("Error: Could not parse Wiki Name. Check form IDs.")
              exit(1)

          # 3. Clean up Date and Logo
          current_date = datetime.now().strftime("%B %Y")
          logo_url = re.findall(r'\((http[s]?://.*?)\)', logo_raw)
          logo = logo_url[0] if logo_url else logo_raw

          # 4. Build the YAML string manually
          new_entry = f'\n- name: "{name}"\n'
          new_entry += f'  link: "{url}"\n'
          new_entry += f'  logo: "{logo}"\n'
          new_entry += f'  description: "{desc}"\n'
          new_entry += f'  joined: "{current_date}"\n'

          # 5. Map Socials
          for line in socials_raw.split('\n'):
              line_l = line.lower()
              u = re.search(r'http[s]?://\S+', line)
              if not u: continue
              link = u.group()
              if "discord" in line_l: new_entry += f'  discord: "{link}"\n'
              elif "twitter" in line_l or "x.com" in line_l: new_entry += f'  twitter: "{link}"\n'
              elif "ko-fi" in line_l or "patreon" in line_l: new_entry += f'  kofi: "{link}"\n'

          # 6. Handle Staff
          if staff_raw and staff_raw != "_No response_":
              new_entry += '  team:\n'
              for staff in staff_raw.split(','):
                  s_name = staff.strip()
                  if s_name:
                      new_entry += f'    - name: "{s_name}"\n'

          # 7. Append to file
          with open('_data/members.yml', 'a', encoding='utf-8') as f:
              f.write(new_entry)
          
          # Pass the name back to the shell for the PR title
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"PROCESSED_WIKI_NAME={name}\n")

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add ${{ env.PROCESSED_WIKI_NAME }} to directory"
          title: "[Wiki Addition] ${{ env.PROCESSED_WIKI_NAME }}"
          branch: "wiki-addition-${{ github.event.issue.number }}"
          body: "Automated wiki addition for **${{ env.PROCESSED_WIKI_NAME }}**. Closes #${{ github.event.issue.number }}"
