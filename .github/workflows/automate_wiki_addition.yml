name: Add Wiki to IRWA Directory
on:
  issues:
    types: [labeled]

jobs:
  update-directory:
    if: github.event.label.name == 'wiki addition request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse Issue Form
        uses: stefanbuck/github-issue-parser@v3
        id: issue-parser
        with:
          template-path: .github/ISSUE_TEMPLATE/request-wiki-addition.yml

      - name: Process Data and Update YAML
        shell: python
        env:
          WIKI_NAME: ${{ steps.issue-parser.outputs.wiki-name }}
          WIKI_URL: ${{ steps.issue-parser.outputs.wiki-url }}
          WIKI_DESC: ${{ steps.issue-parser.outputs.wiki-description }}
          WIKI_LOGO: ${{ steps.issue-parser.outputs.wiki-logo }}
          WIKI_SOCIALS: ${{ steps.issue-parser.outputs.social-links-urls }}
          WIKI_STAFF: ${{ steps.issue-parser.outputs.wiki-staff }}
        run: |
          import re
          import os
          from datetime import datetime

          # 1. Collect and Clean Data
          name = os.getenv("WIKI_NAME", "").strip()
          url = os.getenv("WIKI_URL", "").strip()
          desc = os.getenv("WIKI_DESC", "").strip()
          logo_raw = os.getenv("WIKI_LOGO", "").strip()
          socials_raw = os.getenv("WIKI_SOCIALS", "").strip()
          staff_raw = os.getenv("WIKI_STAFF", "").strip()
          
          current_date = datetime.now().strftime("%B %Y")
          logo_url = re.findall(r'\((http[s]?://.*?)\)', logo_raw)
          logo = logo_url[0] if logo_url else logo_raw

          # 2. Build the YAML string manually to guarantee formatting
          # Using f-strings to force the " " where you want them
          new_entry = f'\n- name: "{name}"\n'
          new_entry += f'  link: "{url}"\n'
          new_entry += f'  logo: "{logo}"\n'
          new_entry += f'  description: "{desc}"\n'
          new_entry += f'  joined: "{current_date}"\n'

          # 3. Handle Socials manually
          for line in socials_raw.split('\n'):
              line_l = line.lower()
              u = re.search(r'http[s]?://\S+', line)
              if not u: continue
              link = u.group()
              if "discord" in line_l: new_entry += f'  discord: "{link}"\n'
              elif "twitter" in line_l or "x.com" in line_l: new_entry += f'  twitter: "{link}"\n'
              elif "ko-fi" in line_l or "patreon" in line_l: new_entry += f'  kofi: "{link}"\n'

          # 4. Handle Staff/Team
          new_entry += '  team:\n'
          for staff in staff_raw.split(','):
              s_name = staff.strip()
              if s_name:
                  new_entry += f'    - name: "{s_name}"\n'

          # 5. Append directly to file without loading/saving the whole thing
          with open('_data/members.yml', 'a', encoding='utf-8') as f:
              f.write(new_entry)

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add ${{ steps.issue-parser.outputs.wiki-name }} to directory"
          title: "[Wiki Addition] ${{ steps.issue-parser.outputs.wiki-name }}"
          branch: "wiki-addition-${{ github.event.issue.number }}"
          body: |
            ### 🛡️ New Wiki Addition Request
            
            **Wiki Name:** ${{ steps.issue-parser.outputs.wiki-name }}
            **Submitted By:** @${{ github.event.issue.user.login }}
            
            This is an automated PR. Closes #${{ github.event.issue.number }}
          labels: |
            automated-pr
