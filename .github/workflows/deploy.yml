name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - name: Install WebP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp
      - name: Convert PNGs to WebP in generated site
        run: |
          find _site -type f -name '*.png' -print0 | while IFS= read -r -d '' png; do
            cwebp -q 90 "$png" -o "${png%.png}.webp"
          done
      - name: Replace PNG references
        run: |
          find _site -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' \) \
            -exec sed -i 's/\.png/\.webp/g' {} +
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: Production
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
