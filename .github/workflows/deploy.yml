name: Deploy Jekyll site

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build with Jekyll
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            bundle exec jekyll build
          else
            bundle exec jekyll build --baseurl "/preview"
          fi
        env:
          JEKYLL_ENV: production

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Convert PNGs to WebP
        run: |
          find _site -type f -name '*.png' -print0 |
          while IFS= read -r -d '' png; do
            convert "$png" "${png%.png}.webp" || \
            echo "::warning::Failed to convert $png"
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rewrite PNG references
        run: node assets/js/png-to-webp.js

      - name: Upload Pages artifact
        if: github.ref_name == 'main'
        uses: actions/upload-pages-artifact@v3

      - name: Deploy preview
        if: github.ref_name != 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          destination_dir: preview
          keep_files: true

  deploy:
    if: github.ref_name == 'main'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: Production
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4