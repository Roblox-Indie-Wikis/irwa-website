---
layout: default
---
<article class="content">
  <div class="content__inner">
    <div class="content__entry">
      <h1>{{ page.title }}</h1>
      <p class="post-page__tagline">{{ page.date | date_to_string: "ordinal", "US" }} - {{ page.author }}</p>
      
      {{ content }}
    </div>
  </div>
</article>
