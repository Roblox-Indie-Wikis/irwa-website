<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script>
  try {
    const theme = localStorage.getItem('theme');
    if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark-mode');
    }
  } catch (e) {
    // localStorage unavailable, fall back to default theme
  }
</script>
<title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="generator" content="Jekyll v{{ jekyll.version }}">
<link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
<link rel="alternate" type="application/atom+xml" href="{{ "/feed.xml" | relative_url }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:image" content="{{ "/media/website/IRWA-Logo1.svg" | absolute_url }}">
<meta property="og:image:width" content="500">
<meta property="og:image:height" content="500">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:type" content="article">
<link rel="shortcut icon" href="{{ "/media/website/IRWA-Logo1.ico" | relative_url }}" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="{{ "/assets/css/style.css" | relative_url }}">
{% if page.url == "/members/" %}
<link rel="stylesheet" type="text/css" href="{{ "/assets/css/members.css" | relative_url }}">
{% endif %}
