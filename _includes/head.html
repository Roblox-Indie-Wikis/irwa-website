<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1">
{% seo %}
<link rel="alternate" type="application/atom+xml" href="{{ "/feed.xml" | relative_url }}">
{% unless page.image %}
    <meta property="og:image" content="{{ "/assets/website/IRWA-Logo-stroke.png" | absolute_url }}">
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">
{% endunless %}
<link rel="shortcut icon" href="{{ "/assets/website/IRWA-Logo1-dynamic.svg" | relative_url }}" type="image/svg+xml">
<link rel="preload" href="{{ '/assets/fonts/Bricolage_Grotesque/BricolageGrotesque-VariableFont_opsz,wdth,wght.ttf' | relative_url }}" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="{{ '/assets/fonts/Instrument_Sans/InstrumentSans-VariableFont_wdth,wght.ttf' | relative_url }}" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="{{ '/assets/fonts/Instrument_Sans/InstrumentSans-Italic-VariableFont_wdth,wght.ttf' | relative_url }}" as="font" type="font/ttf" crossorigin>
<link rel="stylesheet" type="text/css" href="{{ "/assets/css/style.css" | relative_url }}">
<link rel="stylesheet" type="text/css" href="{{ "/assets/css/overflow.css" | relative_url }}">
<link rel="stylesheet" type="text/css" href="{{ "/assets/css/toc.css" | relative_url }}">
{% if page.url == "/members" or page.url == "/partners" %}
<link rel="stylesheet" type="text/css" href="{{ "/assets/css/members.css" | relative_url }}">
{% endif %}
<script data-collect-dnt="true" async src="https://sa-staging.indierobloxwikis.org/latest.js"></script>
<script src="{{ "/assets/js/extensionstats.js" | relative_url }}" defer></script>
{% if page.url == "/" %}
<script type="module" src="{{ "/assets/js/wiki-name-tooltip.js" | relative_url }}"></script>
{% endif %}
